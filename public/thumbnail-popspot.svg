<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#fdf6ee"/>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff8f0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fde8d8;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- dot grid pattern -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="1.5" fill="#e8c9aa" opacity="0.6"/>
  </pattern>
  <rect width="800" height="450" fill="url(#dots)"/>
  <!-- decorative circles -->
  <circle cx="160" cy="140" r="90" fill="#f97316" opacity="0.12"/>
  <circle cx="640" cy="310" r="110" fill="#ec4899" opacity="0.10"/>
  <circle cx="680" cy="100" r="55" fill="#f59e0b" opacity="0.14"/>
  <!-- location pin -->
  <ellipse cx="400" cy="280" rx="22" ry="8" fill="#00000015"/>
  <path d="M400 160 C370 160 348 182 348 208 C348 244 400 285 400 285 C400 285 452 244 452 208 C452 182 430 160 400 160Z" fill="#f97316"/>
  <circle cx="400" cy="208" r="16" fill="#fff" opacity="0.9"/>
  <!-- title -->
  <text x="400" y="336" font-family="Helvetica Neue, Arial, sans-serif" font-size="46" font-weight="900" fill="#1a1a1a" text-anchor="middle" letter-spacing="4">POP SPOT</text>
  <text x="400" y="365" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle" letter-spacing="5">POPUP &amp; EXHIBITION CURATOR</text>
</svg>
