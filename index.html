    <script>
      // 404.html 에서 넘어온 SPA 경로 복원
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded[0] +
            (decoded[1] ? '?' + decoded.slice(1).join('&') : '') +
            l.hash
          );
        }
      }(window.location));
    </script>
